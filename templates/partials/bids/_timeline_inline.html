<div class="app-surface border-top border-bottom px-3 py-3">
  <div class="d-flex align-items-center gap-2 mb-3">
    <span class="badge text-bg-primary">진행</span>
    <span class="badge text-bg-secondary">미진행</span>
    <span class="badge text-bg-light border text-dark">{{ selected_bid.business_type }}</span>
  </div>

  <div class="small text-secondary mb-3">계약 진행과 버전 이벤트를 시간순으로 보여줍니다.</div>

  <div class="d-flex gap-3 overflow-auto pb-1">
    {% for item in selected_bid.timeline %}
      <div class="d-flex align-items-center gap-3">
        <div class="card app-card shadow-sm" style="min-width: 170px;">
          <div class="card-header py-2 px-3 {% if item.status == '완료' %}bg-primary text-white{% elif item.status == '진행중' %}bg-secondary text-white{% else %}bg-light{% endif %}">
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-semibold small">{{ item.stage }}</span>
              <span class="small">{{ item.status }}</span>
            </div>
          </div>
          <div class="card-body py-2 px-3">
            <div class="small text-secondary">번호</div>
            <div class="mb-2">{{ item.number }}</div>
            <div class="small text-secondary">일시</div>
            <div class="mb-2">{{ item.date }}</div>
            <div class="small text-secondary">메모</div>
            <div>{{ item.meta }}</div>
          </div>
        </div>
        {% if not loop.last %}
          <div class="text-secondary fs-4">&rsaquo;</div>
        {% endif %}
      </div>
    {% endfor %}
  </div>
</div>
