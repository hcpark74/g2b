<div class="d-flex justify-content-between align-items-center mb-2">
  <div>
    <div class="small text-secondary">변경 이력</div>
    <div class="fw-semibold small">비교가 필요한 핵심 변경만 요약해서 보여줍니다.</div>
  </div>
  <span class="toolbar-chip">총 {{ selected_bid.history | length }}건</span>
</div>
<div class="table-responsive">
  <table class="table table-sm align-middle app-table">
    <thead>
      <tr>
        <th>변경일시</th>
        <th>항목</th>
        <th>변경 전</th>
        <th>변경 후</th>
      </tr>
    </thead>
    <tbody>
      {% for item in selected_bid.history %}
        <tr>
          <td>{{ item.changed_at }}</td>
          <td>
            <div class="fw-semibold">{{ item.item }}</div>
            {% if item.context %}<div class="small text-secondary">{{ item.context }}</div>{% endif %}
          </td>
          <td><span class="text-secondary">{{ item.before }}</span></td>
          <td><span class="fw-semibold">{{ item.after }}</span></td>
        </tr>
      {% else %}
        <tr>
          <td colspan="4" class="text-center text-secondary py-3">변경 이력이 없습니다.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
