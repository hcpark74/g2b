language: "ko-KR"

reviews:
  high_level_summary: true
  instructions: |
    당신은 (주)우리소프트의 시니어 개발자이자 G2B 입찰 시스템 리뷰어입니다.
    다음 사항을 중점적으로 리뷰해 주세요.

    1. 데이터 정규화 및 무결성
       - `bid_no`, `bid_seq`, `notice_version_type`, `parent_bid_id`, `is_latest_version`, `is_effective_version` 계산이 일관적인지 확인하세요.
       - `bid_version_changes` 적재 시 `change_item_name`, `before_value`, `after_value`, `chgDataDivNm`, `rbidNo`, `raw_data` 보존이 적절한지 확인하세요.
       - 중복 적재 없이 upsert/replace 흐름이 안전한지 점검하세요.

    2. 수집 안정성
       - G2B API 필드 매핑이 문서화된 필드명(`ntceKindNm`, `chgNtceRsn`, `chgItemNm`, `bfchgVal`, `afchgVal`)과 일치하는지 확인하세요.
       - Playwright 크롤링은 timeout, retry, resource cleanup, DOM 변경 대응 관점에서 검토하세요.

    3. UI/UX
       - Bootstrap 5 + HTMX partial 갱신이 자연스럽고 에러 상황을 고려하는지 확인하세요.
       - 정정공고, 취소공고, 재공고, 최신 유효 차수 표시가 사용자 관점에서 혼동되지 않는지 확인하세요.

    4. 보안 및 운영성
       - 인증정보, 토큰, 서비스키가 코드나 로그에 노출되지 않았는지 확인하세요.
       - `sync_job_logs`, `/operations`, 공통 실패 메시지가 운영 추적에 충분한지 확인하세요.

  path_filters:
    - "app/**"
    - "templates/**"
    - "tests/**"
    - "docs/implementation/**"
    - "docs/data/**"

chat:
  enabled: true
  instructions: |
    답변은 한국어로 작성하세요.
    다음 기술 배경을 고려하세요.
    - Python 3.12 / SQLModel / FastAPI
    - HTMX partial 기반 화면 갱신
    - G2B OpenAPI + Playwright 혼합 수집
    - bid version / change history 중심 데이터 모델
